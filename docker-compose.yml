version: '3.8'

services:
  backend-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudchat-backend-1
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI:-mongodb+srv://user:pass@cluster.mongodb.net/cloudchat}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000,http://localhost:5000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MESSAGE_CACHE_TTL_SEC: ${MESSAGE_CACHE_TTL_SEC:-30}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudchat-backend-2
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI:-mongodb+srv://user:pass@cluster.mongodb.net/cloudchat}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000,http://localhost:5000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MESSAGE_CACHE_TTL_SEC: ${MESSAGE_CACHE_TTL_SEC:-30}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: cloudchat-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: cloudchat-lb
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
    ports:
      - "5000:80"
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

networks:
  default:
    name: cloudchat-network

volumes:
  redis-data:
